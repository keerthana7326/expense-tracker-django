{% extends 'base.html' %}

{% block content %}

<h2>Delete Expense</h2>

<p>
    Are you sure you want to delete:
    <strong>{{ object.title }}</strong>?
</p>

<form method="POST">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Yes,delete
    </button>

    <a href="{% url 'expense_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
